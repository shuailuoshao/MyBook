<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出功能测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .log {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>导出功能测试</h1>

    <div class="test-section">
        <h2>测试1: 检查electronAPI是否存在</h2>
        <button onclick="testAPI()">检查API</button>
        <div id="apiLog" class="log"></div>
    </div>

    <div class="test-section">
        <h2>测试2: 模拟导出流程</h2>
        <button onclick="testExport()">测试导出</button>
        <div id="exportLog" class="log"></div>
    </div>

    <script>
        function logTo(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent += message + '\n';
        }

        function testAPI() {
            const log = document.getElementById('apiLog');
            log.textContent = '';

            logTo('apiLog', '检查window.electronAPI是否存在...');
            if (window.electronAPI) {
                logTo('apiLog', '✓ window.electronAPI存在');

                // 检查具体API
                const apis = ['showSaveDialog', 'exportData', 'showOpenDialog', 'importData'];
                apis.forEach(api => {
                    if (typeof window.electronAPI[api] === 'function') {
                        logTo('apiLog', `✓ electronAPI.${api} 存在`);
                    } else {
                        logTo('apiLog', `✗ electronAPI.${api} 不存在`);
                    }
                });
            } else {
                logTo('apiLog', '✗ window.electronAPI不存在');
            }
        }

        async function testExport() {
            const log = document.getElementById('exportLog');
            log.textContent = '';

            logTo('exportLog', '开始测试导出流程...');

            if (!window.electronAPI || typeof window.electronAPI.showSaveDialog !== 'function') {
                logTo('exportLog', '错误: electronAPI.showSaveDialog不可用');
                return;
            }

            try {
                logTo('exportLog', '1. 调用showSaveDialog...');
                const result = await window.electronAPI.showSaveDialog({
                    defaultPath: 'test_export.json',
                    filters: [{ name: 'JSON文件', extensions: ['json'] }]
                });
                logTo('exportLog', `showSaveDialog结果: ${JSON.stringify(result)}`);

                if (result.success && result.filePath) {
                    logTo('exportLog', '2. 调用exportData...');
                    const exportResult = await window.electronAPI.exportData({
                        format: 'json',
                        data: JSON.stringify({ test: 'data', timestamp: new Date().toISOString() }, null, 2),
                        filePath: result.filePath
                    });
                    logTo('exportLog', `exportData结果: ${JSON.stringify(exportResult)}`);
                } else {
                    logTo('exportLog', '用户取消了保存对话框');
                }
            } catch (error) {
                logTo('exportLog', `错误: ${error.message}`);
                console.error('导出测试错误:', error);
            }
        }
    </script>
</body>
</html>
